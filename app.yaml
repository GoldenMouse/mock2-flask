command:
  - gunicorn
  - app:app
  - --bind
  - 0.0.0.0:8000
  - --workers
  - "2"
  # Requests no longer block on the ~10 min warehouse start (a background thread
  # does that), but give queries generous headroom over the 30s gunicorn default.
  - --timeout
  - "120"
  - --graceful-timeout
  - "120"

env:
  # The SQL warehouse the app queries. Copy "HTTP path" from the warehouse's
  # Connection details tab (SQL Warehouses -> your warehouse -> Connection
  # details), e.g. /sql/1.0/warehouses/abc123def456. When you attach a SQL
  # warehouse resource to the app in the Databricks UI, you can instead
  # reference it here with `valueFrom` and delete this literal value.
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/REPLACE_WITH_WAREHOUSE_ID"

  # The server hostname is derived automatically from DATABRICKS_HOST (which the
  # Apps runtime injects) with the scheme stripped. Only set this if you need to
  # override it — use the exact bare "Server hostname" from the same Connection
  # details tab (e.g. dbc-xxxx.cloud.databricks.com, NO https://).
  # - name: DATABRICKS_SERVER_HOSTNAME
  #   value: "dbc-xxxx.cloud.databricks.com"

  # Catalog and schema that hold the tblentry table. Change these to point the
  # app at a different location without touching code.
  - name: DATABRICKS_CATALOG
    value: "spark_catalog"
  - name: DATABRICKS_SCHEMA
    value: "marketarm"

  # If the SQL warehouse is stopped, the app starts it on demand when a user
  # opens the app; the UI shows a loading state until it's RUNNING (a cold
  # classic warehouse can take ~10 minutes). Set to "0" to disable auto-start.
  - name: AUTO_START_WAREHOUSE
    value: "1"
